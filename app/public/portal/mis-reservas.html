<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Reservas - Portal Paciente</title>
    <link rel="stylesheet" href="css/portal.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="reservas-page">
    <header>
        <div class="container">
            <div class="logo">
                <a href="index.html">GCI-UMG</a>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="solicitud.html">Nueva Reserva</a></li>
                    <li><a href="#" onclick="logout()" class="btn-outline">Cerrar Sesión</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <h1>Mis Reservas</h1>
        <p>Historial de tus solicitudes de cirugía y su estado actual.</p>
        
        <div class="table-container">
            <table id="reservas-table">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Cirugía</th>
                        <th>Médico</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="reservas-body">
                    <!-- Cargando... -->
                    <tr>
                        <td colspan="5">Cargando tus reservas...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal Detalle -->
    <div id="modal-detalle" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Detalle de Reserva</h2>
            <div id="detalle-reserva"></div>
        </div>
    </div>

    <script src="js/portal.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token_paciente');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            cargarMisReservas();
        });
    </script>
</body>
</html>
