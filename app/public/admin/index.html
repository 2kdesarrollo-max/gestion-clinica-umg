<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Hospital - GCI-UMG Admin</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="/imagenes/sistemagestion.png" alt="Logo Hospital" style="height: 100px;">
                <h1>Gestión Clínica Integral</h1>
                <p>Acceso Administrativo UMG</p>
            </div>
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required placeholder="Tu usuario">
                </div>
                <div class="form-group password-wrap">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                    <button type="button" class="password-toggle" data-target="password">Ver</button>
                </div>
                <button type="submit" class="btn-primary btn-block" id="login-btn">
                    <span>Ingresar</span>
                    <div class="loader" id="login-loader" style="display:none;"></div>
                </button>
            </form>
            <div id="login-error" class="error-msg" style="display:none;"></div>
        </div>
    </div>
    <script src="js/admin.js"></script>
    <script>
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const loader = document.getElementById('login-loader');
            const errorDiv = document.getElementById('login-error');
            
            btn.disabled = true;
            loader.style.display = 'inline-block';
            errorDiv.style.display = 'none';

            const formData = new FormData(e.target);
            const credentials = Object.fromEntries(formData);

            try {
                const client = new APIClient();
                const data = await client.login(credentials);
                localStorage.setItem('admin_token', data.token);
                localStorage.setItem('admin_user', JSON.stringify(data.usuario));
                window.location.href = 'dashboard.html';
            } catch (err) {
                errorDiv.innerText = err.message;
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
