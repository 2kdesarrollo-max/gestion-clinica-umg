<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas - GCI-UMG Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">
    <aside class="sidebar" id="sidebar-container"></aside>
    <main class="admin-main">
        <header class="main-header">
            <h1>Gestión de Reservas</h1>
            <div class="header-actions">
                <button onclick="abrirModalReserva()" class="btn-primary" id="btn-nueva-reserva">Nueva Reserva</button>
            </div>
        </header>
        <section class="filters-card">
            <select id="filtro-estado" onchange="cargarReservas()">
                <option value="">Todos los estados</option>
                <option value="SOLICITADA">Solicitadas</option>
                <option value="APROBADA">Aprobadas</option>
                <option value="EN_CURSO">En Curso</option>
                <option value="COMPLETADA">Completadas</option>
                <option value="CANCELADA">Canceladas</option>
            </select>
        </section>
        <section class="table-card">
            <div class="table-container">
                <table id="reservas-table">
                    <thead>
                        <tr>
                            <th>Paciente</th>
                            <th>Cirugía</th>
                            <th>Médico</th>
                            <th>Quirófano</th>
                            <th>Fecha</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="reservas-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal Reserva -->
    <div id="modal-reserva" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModalReserva()">&times;</span>
            <h2 id="modal-titulo">Nueva Reserva</h2>
            <form id="reserva-form">
                <input type="hidden" id="id_reserva" name="id_reserva">
                <div class="form-group">
                    <label for="id_paciente">Paciente</label>
                    <select id="id_paciente" name="id_paciente" required></select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="id_medico">Médico</label>
                        <select id="id_medico" name="id_medico" required></select>
                    </div>
                    <div class="form-group">
                        <label for="id_quirofano">Quirófano</label>
                        <select id="id_quirofano" name="id_quirofano" required></select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="id_especialidad">Especialidad</label>
                    <select id="id_especialidad" name="id_especialidad" required></select>
                </div>
                <div class="form-group">
                    <label for="tipo_cirugia">Tipo de Cirugía</label>
                    <input type="text" id="tipo_cirugia" name="tipo_cirugia" required>
                </div>
                <div class="form-group">
                    <label for="prioridad">Prioridad</label>
                    <select id="prioridad" name="prioridad" required>
                        <option value="NORMAL">NORMAL</option>
                        <option value="URGENTE">URGENTE</option>
                        <option value="EMERGENCIA">EMERGENCIA</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Equipos médicos (opcional)</label>
                    <div class="equipos-wrap">
                        <table class="equipos-table">
                            <thead>
                                <tr>
                                    <th>Equipo</th>
                                    <th class="center">Asignar</th>
                                    <th class="center">Cantidad</th>
                                    <th class="center">Disponible</th>
                                </tr>
                            </thead>
                            <tbody id="equipos-body"></tbody>
                        </table>
                    </div>
                </div>
                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" name="descripcion" rows="2"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="fecha">Fecha</label>
                        <input type="date" id="fecha" name="fecha" required>
                    </div>
                    <div class="form-group">
                        <label for="hora_inicio">Hora Inicio</label>
                        <input type="time" id="hora_inicio" name="hora_inicio" required>
                    </div>
                    <div class="form-group">
                        <label for="hora_fin">Hora Fin</label>
                        <input type="time" id="hora_fin" name="hora_fin" required>
                    </div>
                </div>
                <div id="disponibilidad-box" class="availability-box" style="display:none;"></div>
                <button type="submit" class="btn-primary btn-block">Guardar Reserva</button>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('admin_user'));
            if (!user) { window.location.href = 'login.html'; return; }
            initSidebar(user.privilegios);
            cargarReservas();
            // Cargar selectores (médicos, pacientes, etc) al abrir modal
        });
    </script>
</body>
</html>
