<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfiles - GCI-UMG Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">
    <aside class="sidebar" id="sidebar-container"></aside>
    <main class="admin-main">
        <header class="main-header">
            <h1>Perfiles y Privilegios</h1>
            <div class="header-actions">
                <button onclick="abrirModalPerfil()" class="btn-primary">Nuevo Perfil</button>
            </div>
        </header>
        <section class="table-card">
            <div class="table-container">
                <table id="perfiles-table">
                    <thead><tr><th>Nombre</th><th>Descripción</th><th>Privilegios</th><th>Estado</th><th>Acciones</th></tr></thead>
                    <tbody id="perfiles-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="modal-perfil" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModalPerfil()">&times;</span>
            <h2 id="modal-titulo">Nuevo Perfil</h2>
            <form id="perfil-form">
                <input type="hidden" id="id_perfil" name="id_perfil">
                <div class="form-group"><label for="nombre">Nombre</label><input type="text" id="nombre" name="nombre" required></div>
                <div class="form-group"><label for="descripcion">Descripción</label><input type="text" id="descripcion" name="descripcion" required></div>
                
                <label>Privilegios:</label>
                <div class="privilegios-grid" id="privilegios-grid">
                    <label><input type="checkbox" name="privilegios" value="dashboard:r"> Dashboard (R)</label>

                    <label><input type="checkbox" name="privilegios" value="pacientes:r"> Pacientes (R)</label>
                    <label><input type="checkbox" name="privilegios" value="pacientes:w"> Pacientes (W)</label>

                    <label><input type="checkbox" name="privilegios" value="medicos:r"> Médicos (R)</label>
                    <label><input type="checkbox" name="privilegios" value="medicos:w"> Médicos (W)</label>

                    <label><input type="checkbox" name="privilegios" value="especialidades:r"> Especialidades (R)</label>
                    <label><input type="checkbox" name="privilegios" value="especialidades:w"> Especialidades (W)</label>

                    <label><input type="checkbox" name="privilegios" value="quirofanos:r"> Quirófanos (R)</label>
                    <label><input type="checkbox" name="privilegios" value="quirofanos:w"> Quirófanos (W)</label>

                    <label><input type="checkbox" name="privilegios" value="equipos:r"> Equipos (R)</label>
                    <label><input type="checkbox" name="privilegios" value="equipos:w"> Equipos (W)</label>

                    <label><input type="checkbox" name="privilegios" value="reservas:r"> Reservas (R)</label>
                    <label><input type="checkbox" name="privilegios" value="reservas:w"> Reservas (W)</label>

                    <label><input type="checkbox" name="privilegios" value="emergencias:r"> Emergencias (R)</label>
                    <label><input type="checkbox" name="privilegios" value="emergencias:w"> Emergencias (W)</label>

                    <label><input type="checkbox" name="privilegios" value="reportes:r"> Reportes (R)</label>
                    <label><input type="checkbox" name="privilegios" value="reportes:w"> Reportes (W)</label>

                    <label><input type="checkbox" name="privilegios" value="usuarios:r"> Usuarios (R)</label>
                    <label><input type="checkbox" name="privilegios" value="usuarios:w"> Usuarios (W)</label>

                    <label><input type="checkbox" name="privilegios" value="perfiles:r"> Perfiles (R)</label>
                    <label><input type="checkbox" name="privilegios" value="perfiles:w"> Perfiles (W)</label>

                    <label><input type="checkbox" name="privilegios" value="monitoreo:r"> Monitoreo (R)</label>
                    <label><input type="checkbox" name="privilegios" value="monitoreo:w"> Monitoreo (W)</label>
                </div>
                <button type="submit" class="btn-primary btn-block">Guardar</button>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('admin_user'));
            if (!user) { window.location.href = 'login.html'; return; }
            initSidebar(user.privilegios);
            cargarPerfiles();
        });
    </script>
</body>
</html>
