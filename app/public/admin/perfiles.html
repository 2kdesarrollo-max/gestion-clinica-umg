<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfiles - GCI-UMG Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">
    <aside class="sidebar" id="sidebar-container"></aside>
    <main class="admin-main">
        <header class="main-header">
            <h1>Perfiles y Privilegios</h1>
            <div class="header-actions">
                <button onclick="abrirModalPerfil()" class="btn-primary">Nuevo Perfil</button>
            </div>
        </header>
        <section class="table-card">
            <div class="table-container">
                <table id="perfiles-table">
                    <thead><tr><th>Nombre</th><th>Descripción</th><th>Privilegios</th><th>Estado</th><th>Acciones</th></tr></thead>
                    <tbody id="perfiles-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="modal-perfil" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModalPerfil()">&times;</span>
            <h2 id="modal-titulo">Nuevo Perfil</h2>
            <form id="perfil-form">
                <input type="hidden" id="id_perfil" name="id_perfil">
                <div class="form-group"><label for="nombre">Nombre</label><input type="text" id="nombre" name="nombre" required></div>
                <div class="form-group"><label for="descripcion">Descripción</label><input type="text" id="descripcion" name="descripcion" required></div>
                
                <label>Privilegios:</label>
                <div class="priv-table-wrap">
                    <table class="priv-table" aria-label="Privilegios por módulo">
                        <thead>
                            <tr>
                                <th>Módulo</th>
                                <th class="center">Lectura (R)</th>
                                <th class="center">Escritura (W)</th>
                            </tr>
                        </thead>
                        <tbody id="privilegios-grid">
                            <tr>
                                <td>Dashboard</td>
                                <td class="center"><input type="checkbox" name="privilegios" value="dashboard:r" data-mod="dashboard" data-perm="r"></td>
                                <td class="center"><input type="checkbox" name="privilegios" value="dashboard:w" data-mod="dashboard" data-perm="w"></td>
                            </tr>
                            <tr>
                                <td>Pacientes</td>
                                <td class="center"><input type="checkbox" name="privilegios" value="pacientes:r" data-mod="pacientes" data-perm="r"></td>
                                <td class="center"><input type="checkbox" name="privilegios" value="pacientes:w" data-mod="pacientes" data-perm="w"></td>
                            </tr>
                            <tr>
                                <td>Médicos</td>
                                <td class="center"><input type="checkbox" name="privilegios" value="medicos:r" data-mod="medicos" data-perm="r"></td>
                                <td class="center"><input type="checkbox" name="privilegios" value="medicos:w" data-mod="medicos" data-perm="w"></td>
                            </tr>
                            <tr>
                                <td>Especialidades</td>
                                <td class="center"><input type="checkbox" name="privilegios" value="especialidades:r" data-mod="especialidades" data-perm="r"></td>
                                <td class="center"><input type="checkbox" name="privilegios" value="especialidades:w" data-mod="especialidades" data-perm="w"></td>
                            </tr>
                            <tr>
                                <td>Quirófanos</td>
                                <td class="center"><input type="checkbox" name="privilegios" value="quirofanos:r" data-mod="quirofanos" data-perm="r"></td>
                                <td class="center"><input type="checkbox" name="privilegios" value="quirofanos:w" data-mod="quirofanos" data-perm="w"></td>
                            </tr>
                            <tr>
                                <td>Equipos</td>
                                <td class="center"><input type="checkbox" name="privilegios" value="equipos:r" data-mod="equipos" data-perm="r"></td>
                                <td class="center"><input type="checkbox" name="privilegios" value="equipos:w" data-mod="equipos" data-perm="w"></td>
                            </tr>
                            <tr>
                                <td>Reservas</td>
                                <td class="center"><input type="checkbox" name="privilegios" value="reservas:r" data-mod="reservas" data-perm="r"></td>
                                <td class="center"><input type="checkbox" name="privilegios" value="reservas:w" data-mod="reservas" data-perm="w"></td>
                            </tr>
                            <tr>
                                <td>Emergencias</td>
                                <td class="center"><input type="checkbox" name="privilegios" value="emergencias:r" data-mod="emergencias" data-perm="r"></td>
                                <td class="center"><input type="checkbox" name="privilegios" value="emergencias:w" data-mod="emergencias" data-perm="w"></td>
                            </tr>
                            <tr>
                                <td>Reportes</td>
                                <td class="center"><input type="checkbox" name="privilegios" value="reportes:r" data-mod="reportes" data-perm="r"></td>
                                <td class="center"><input type="checkbox" name="privilegios" value="reportes:w" data-mod="reportes" data-perm="w"></td>
                            </tr>
                            <tr>
                                <td>Usuarios</td>
                                <td class="center"><input type="checkbox" name="privilegios" value="usuarios:r" data-mod="usuarios" data-perm="r"></td>
                                <td class="center"><input type="checkbox" name="privilegios" value="usuarios:w" data-mod="usuarios" data-perm="w"></td>
                            </tr>
                            <tr>
                                <td>Perfiles</td>
                                <td class="center"><input type="checkbox" name="privilegios" value="perfiles:r" data-mod="perfiles" data-perm="r"></td>
                                <td class="center"><input type="checkbox" name="privilegios" value="perfiles:w" data-mod="perfiles" data-perm="w"></td>
                            </tr>
                            <tr>
                                <td>Monitoreo</td>
                                <td class="center"><input type="checkbox" name="privilegios" value="monitoreo:r" data-mod="monitoreo" data-perm="r"></td>
                                <td class="center"><input type="checkbox" name="privilegios" value="monitoreo:w" data-mod="monitoreo" data-perm="w"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <button type="submit" class="btn-primary btn-block">Guardar</button>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('admin_user'));
            if (!user) { window.location.href = 'login.html'; return; }
            initSidebar(user.privilegios);
            cargarPerfiles();
        });
    </script>
</body>
</html>
