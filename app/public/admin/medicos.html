<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Médicos - GCI-UMG Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">
    <aside class="sidebar" id="sidebar-container"></aside>
    <main class="admin-main">
        <header class="main-header">
            <h1>Gestión de Médicos</h1>
            <div class="header-actions">
                <button onclick="abrirModalMedico()" class="btn-primary">Nuevo Médico</button>
            </div>
        </header>
        <section class="filters-card">
            <input type="text" id="busqueda-medico" placeholder="Buscar por nombre o apellido..." onkeyup="filtrarMedicos()">
            <select id="filtro-especialidad" onchange="filtrarMedicos()">
                <option value="">Todas las especialidades</option>
            </select>
        </section>
        <section class="table-card">
            <div class="table-container">
                <table id="medicos-table">
                    <thead>
                        <tr>
                            <th>Nombre Completo</th>
                            <th>Especialidad</th>
                            <th>Licencia</th>
                            <th>Email</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="medicos-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="modal-medico" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModalMedico()">&times;</span>
            <h2 id="modal-titulo">Nuevo Médico</h2>
            <form id="medico-form">
                <input type="hidden" id="id_medico" name="id_medico">
                <input type="hidden" id="id_usuario_sistema" name="id_usuario_sistema">
                <div class="form-row">
                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" required>
                    </div>
                    <div class="form-group">
                        <label for="apellido">Apellido</label>
                        <input type="text" id="apellido" name="apellido" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="id_especialidad">Especialidad</label>
                    <select id="id_especialidad" name="id_especialidad" required></select>
                </div>
                <div class="form-group">
                    <label for="licencia">Licencia Médica</label>
                    <input type="text" id="licencia" name="licencia" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="text" id="telefono" name="telefono">
                </div>
                <h3>Acceso al sistema (opcional)</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="username_sistema">Usuario</label>
                        <input type="text" id="username_sistema" name="username_sistema" placeholder="Ej: dr.coy">
                    </div>
                    <div class="form-group password-wrap">
                        <label for="password_sistema">Contraseña</label>
                        <input type="password" id="password_sistema" name="password_sistema" placeholder="••••••••">
                        <button type="button" class="password-toggle" data-target="password_sistema">Ver</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="id_perfil_sistema">Perfil (rol)</label>
                    <select id="id_perfil_sistema" name="id_perfil_sistema"></select>
                </div>
                <button type="submit" class="btn-primary btn-block">Guardar</button>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('admin_user'));
            if (!user) { window.location.href = 'login.html'; return; }
            initSidebar(user.privilegios);
            cargarEspecialidadesFiltro();
            cargarMedicos();
        });
    </script>
</body>
</html>
