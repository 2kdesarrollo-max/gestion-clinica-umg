<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GCI-UMG Admin</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="/imagenes/logo-hospital.png" alt="Logo" onerror="this.src='https://via.placeholder.com/150x50?text=GCI-UMG'">
            <h2>Admin GCI-UMG</h2>
        </div>
        <nav id="sidebar-nav">
            <!-- Sidebar se cargará dinámicamente -->
        </nav>
        <div class="sidebar-footer">
            <div id="user-info">
                <p id="user-name">Usuario Admin</p>
                <p id="user-role">Administrador</p>
            </div>
            <button onclick="logoutAdmin()" class="btn-logout">Cerrar Sesión</button>
        </div>
    </aside>

    <main class="admin-main">
        <header class="main-header">
            <h1>Dashboard</h1>
            <div class="header-actions">
                <span id="last-refresh">Actualizado: --:--:--</span>
                <button onclick="refreshDashboard()" class="btn-refresh">Actualizar</button>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <h3>Quirófanos Libres</h3>
                <p id="stat-quirofanos" class="stat-value">--</p>
            </div>
            <div class="stat-card warning">
                <h3>Reservas Pendientes</h3>
                <p id="stat-reservas" class="stat-value">--</p>
            </div>
            <div class="stat-card danger">
                <h3>Emergencias Activas</h3>
                <p id="stat-emergencias" class="stat-value">--</p>
            </div>
            <div class="stat-card success">
                <h3>Cirugías Completadas</h3>
                <p id="stat-completadas" class="stat-value">--</p>
            </div>
        </section>

        <section class="dashboard-tables">
            <div class="table-card">
                <h2>Últimas Reservas</h2>
                <div class="table-container">
                    <table id="ultimas-reservas">
                        <thead>
                            <tr>
                                <th>Paciente</th>
                                <th>Cirugía</th>
                                <th>Fecha</th>
                                <th>Estado</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="ultimas-reservas-body">
                            <!-- Datos dinámicos -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="table-card">
                <h2>Emergencias Activas</h2>
                <div class="table-container">
                    <table id="emergencias-activas">
                        <thead>
                            <tr>
                                <th>Paciente</th>
                                <th>Quirófano</th>
                                <th>Prioridad</th>
                                <th>Hora</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="emergencias-activas-body">
                            <!-- Datos dinámicos -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('admin_user'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            initSidebar(user.privilegios);
            document.getElementById('user-name').innerText = user.nombre;
            document.getElementById('user-role').innerText = user.perfil;
            refreshDashboard();
            setInterval(refreshDashboard, 60000); // Auto-refresh cada minuto
        });
    </script>
</body>
</html>
